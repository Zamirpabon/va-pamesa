name: Mantener Supabase activa

# El plan gratis de Supabase pausa el proyecto tras 7 días sin actividad.
# Este cron le manda una consulta diaria (RPC ping) para mantenerlo despierto.
# Requiere 2 secrets del repo: SUPABASE_URL y SUPABASE_ANON_KEY.

on:
  schedule:
    - cron: '0 7 * * *' # diario 07:00 UTC (~02:00 Colombia)
  workflow_dispatch: # permite ejecutarlo a mano

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Consultar la base de datos (mantiene el proyecto despierto)
        run: |
          codigo=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/ping" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Respuesta HTTP: $codigo"
          if [ "$codigo" != "200" ]; then
            echo "El ping no respondió 200"; exit 1
          fi
